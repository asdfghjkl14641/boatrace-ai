# ============================================================
# 毎日 深夜0時 (日本時間) に「前日分」のデータを取得するワークフロー
# ------------------------------------------------------------
# 【注意】
#   SQLite移行後はこのワークフローは「手動実行のみ」になっている。
#   理由: データ保存先がローカル boatrace.db に切り替わり、
#         GitHub Actions から直接ローカルDBに書けなくなったため。
#   ローカル運用: run_daily.bat を Windows タスクスケジューラに登録して毎日実行。
#   Supabaseに書き戻すなら下記 schedule をコメント解除し、
#   DB_MODE=supabase を env に追加してください。
# ============================================================
name: Daily boatrace fetch (manual only)

on:
  # schedule:
  #   - cron: "0 15 * * *"  # UTC 15:00 = JST 00:00 (disabled: SQLite移行のため)
  workflow_dispatch:
    inputs:
      date:
        description: "取得する日付 (YYYY-MM-DD, 空なら昨日)"
        required: false
        default: ""
      db_mode:
        description: "保存先 (supabase/sqlite)。sqlite はGH Actionsでは無意味なのでsupabaseに限る"
        required: false
        default: "supabase"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # GitHub Actions上限360分より少し短く

    env:
      # GitHub SecretsからDB接続情報を注入 (コードには書かない)
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # タイムゾーンを日本時間に
      TZ: Asia/Tokyo
      # PythonのUnicode出力が壊れないように
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      # リクエスト間隔 (秒)。ブロックや異常が出たら 1.5〜2.0 に上げる。
      FETCH_INTERVAL_SEC: "0.8"
      DB_MODE: ${{ github.event.inputs.db_mode || 'supabase' }}

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DB使用量を事前チェック (80%超で警告)
        continue-on-error: true
        run: python -m scripts.check_db_usage

      - name: 昨日分のデータを取得 (手動指定があればその日付)
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m scripts.fetch_all --start "${{ github.event.inputs.date }}"
          else
            python -m scripts.fetch_all --yesterday
          fi

      - name: DB使用量を事後チェック
        if: always()
        continue-on-error: true
        run: python -m scripts.check_db_usage

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
