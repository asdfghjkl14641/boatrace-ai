# ============================================================
# 過去データの初期取得用ワークフロー (手動実行)
# ------------------------------------------------------------
# GitHub Actions は 1実行あたり最大 6時間 (360分) の制限があるため、
# 長い期間を一気に取得しようとするとタイムアウトする。
# そのため「1週間分ずつ」手動で実行することを推奨。
#
# 使い方:
#   1. GitHub → Actions → "Backfill boatrace data" を選択
#   2. "Run workflow" ボタン → start と end を YYYY-MM-DD で入力
#   3. 実行終了後、次の1週間を同じ手順で実行
#
# 例) 過去1か月を取る場合
#   - 2026-03-19 〜 2026-03-25
#   - 2026-03-26 〜 2026-04-01
#   - 2026-04-02 〜 2026-04-08
#   - 2026-04-09 〜 2026-04-15
# ============================================================
name: Backfill boatrace data (manual, weekly chunks)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "開始日 YYYY-MM-DD (必須)"
        required: true
      end:
        description: "終了日 YYYY-MM-DD (必須, startから最大7日以内推奨)"
        required: true
      stadiums:
        description: "会場ID (カンマ区切り。空なら全24会場)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TZ: Asia/Tokyo
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 依存ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DB使用量を事前チェック
        continue-on-error: true
        run: python -m scripts.check_db_usage

      - name: 指定期間のデータを取得
        run: |
          ARGS="--start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }}"
          if [ -n "${{ github.event.inputs.stadiums }}" ]; then
            ARGS="$ARGS --stadiums ${{ github.event.inputs.stadiums }}"
          fi
          echo "Running: python -m scripts.fetch_all $ARGS"
          python -m scripts.fetch_all $ARGS

      - name: DB使用量を事後チェック
        if: always()
        continue-on-error: true
        run: python -m scripts.check_db_usage

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-logs-${{ github.event.inputs.start }}-${{ github.event.inputs.end }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
