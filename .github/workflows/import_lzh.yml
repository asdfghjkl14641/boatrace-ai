# ============================================================
# 公式LZH Kファイル (競走成績) から race_results/current_series を補完
# ------------------------------------------------------------
# lhafile は C拡張が必要なので Windows ローカルでは動かない。
# GitHub Actions の ubuntu-latest 上で build&run する。
#
# 使い方:
#   Actions → "Import LZH K files (race_results/current_series)" → Run workflow
#   start/end に YYYY-MM-DD を入力。
#   1週間単位で分割実行するのが安全 (公式サーバへの負荷と360分制限のため)。
# ============================================================
name: Import LZH K files (race_results/current_series)

on:
  workflow_dispatch:
    inputs:
      start:
        description: "開始日 YYYY-MM-DD"
        required: true
      end:
        description: "終了日 YYYY-MM-DD"
        required: true

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      TZ: Asia/Tokyo
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      LZH_INTERVAL_SEC: "0.5"

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: ビルド依存(gcc/python-dev) は setup-python 付属なのでOK
        run: |
          python --version
          pip --version

      - name: 依存ライブラリをインストール (lhafileはLinuxでビルドされる)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: LZH K ファイル取り込み
        run: |
          python -m scripts.import_lzh \
            --start "${{ github.event.inputs.start }}" \
            --end   "${{ github.event.inputs.end }}"

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: import-lzh-${{ github.event.inputs.start }}-${{ github.event.inputs.end }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
