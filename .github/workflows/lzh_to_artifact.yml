# ============================================================
# LZH K/B ファイルを取り込んで SQLite アーティファクトとして出力する。
# ------------------------------------------------------------
# 目的:
#   - メインDBは boatrace-ai/boatrace.db (ローカル) に移行済みで、
#     GitHub Actions からは直接書けない。
#   - そこでGH側で「取り込み用の一時SQLite」を作り、アーティファクトとして
#     ダウンロードして、scripts/merge_sqlite.py でローカルに差分マージする。
#
# 使い方:
#   1. Actions → このワークフロー → "Run workflow"
#   2. start/end と include_b (番組表=race_cards も取るか) を指定
#   3. 完了後、ページ上から `boatrace-lzh-<start>-<end>.zip` をダウンロード
#   4. zip を展開すると中に `artifact.db` が入っている
#   5. ローカルで: python -m scripts.merge_sqlite path/to/artifact.db
# ============================================================
name: LZH to SQLite artifact

on:
  workflow_dispatch:
    inputs:
      start:
        description: "開始日 YYYY-MM-DD"
        required: true
      end:
        description: "終了日 YYYY-MM-DD"
        required: true
      include_b:
        description: "番組表(B file)も取り込み race_cards を作成する"
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      DB_MODE: sqlite
      SQLITE_PATH: artifact.db
      TZ: Asia/Tokyo
      PYTHONIOENCODING: utf-8
      PYTHONUNBUFFERED: "1"
      # 公式サイトへの礼儀としてローカルより間隔を空ける
      LZH_INTERVAL_SEC: "3.0"

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 依存をインストール (lhafile は Linux でビルド可)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 空の artifact.db にスキーマを適用
        run: |
          rm -f artifact.db
          python -c "
          import sqlite3
          conn = sqlite3.connect('artifact.db')
          with open('sql/sqlite_schema.sql', encoding='utf-8') as f:
              conn.executescript(f.read())
          conn.commit(); conn.close()
          print('artifact.db created')
          "

      - name: K ファイル取り込み (race_results + current_series)
        run: |
          python -m scripts.import_lzh \
            --start "${{ github.event.inputs.start }}" \
            --end   "${{ github.event.inputs.end }}"

      - name: B ファイル取り込み (race_cards) - include_b=true の時のみ
        if: ${{ github.event.inputs.include_b == 'true' }}
        run: |
          python -m scripts.import_lzh_b \
            --start "${{ github.event.inputs.start }}" \
            --end   "${{ github.event.inputs.end }}"

      - name: artifact.db を VACUUM して圧縮
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('artifact.db')
          conn.execute('VACUUM')
          conn.close()
          import os
          print(f'final size: {os.path.getsize(\"artifact.db\")/1024/1024:.2f} MB')
          "

      - name: アーティファクトとしてアップロード
        uses: actions/upload-artifact@v4
        with:
          name: boatrace-lzh-${{ github.event.inputs.start }}-${{ github.event.inputs.end }}
          path: |
            artifact.db
            logs/
          retention-days: 30

      - name: ログをサマリに
        if: always()
        run: |
          echo "### 取り込みサマリ" >> $GITHUB_STEP_SUMMARY
          python -c "
          import sqlite3
          conn = sqlite3.connect('artifact.db')
          for t in ('race_cards','race_results','current_series','race_conditions'):
              try:
                  n = conn.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0]
                  print(f'- {t}: {n:,} 行')
              except Exception as e:
                  print(f'- {t}: skipped ({e})')
          conn.close()
          " >> $GITHUB_STEP_SUMMARY
